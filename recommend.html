<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装机大师 - 一键推荐</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="particleCanvas"></canvas>

<nav class="nav">
  <div class="nav-logo">🖥 装机大师</div>
  <div class="nav-links">
    <a href="index.html">互动装机</a>
    <a href="recommend.html" class="active">一键推荐</a>
    <a href="service.html">上门组装 / 快递</a>
  </div>
  <div class="nav-total">💡 小白装机，一键搞定</div>
</nav>

<div class="recommend-page">

  <div class="rec-hero">
    <h1>🪄 一键装机推荐</h1>
    <p class="rec-hero-sub">像买笔记本一样简单——告诉预算和用途，自动生成最佳配置</p>
  </div>

  <!-- 输入区 -->
  <div class="rec-input-card">
    <!-- 预算滑块 -->
    <div class="rec-section">
      <div class="rec-section-title">💰 你的预算</div>
      <div class="rec-budget-slider-wrap">
        <input type="range" id="budgetSlider" class="rec-slider"
               min="3000" max="20000" step="500" value="6000">
        <div class="rec-budget-display" id="budgetDisplay">¥6,000</div>
      </div>
      <div class="rec-budget-labels">
        <span>¥3,000</span><span>¥6,000</span><span>¥10,000</span><span>¥15,000</span><span>¥20,000</span>
      </div>
    </div>

    <!-- 用途选择 -->
    <div class="rec-section">
      <div class="rec-section-title">🎯 主要用途（可多选）</div>
      <div class="rec-usage-grid">
        <label class="rec-usage-card">
          <input type="checkbox" id="useOffice" checked>
          <span class="rec-usage-icon">📝</span>
          <span class="rec-usage-name">办公影音</span>
          <span class="rec-usage-desc">Word/Excel/上网/看剧</span>
        </label>
        <label class="rec-usage-card">
          <input type="checkbox" id="useLightGame">
          <span class="rec-usage-icon">🎮</span>
          <span class="rec-usage-name">轻度游戏</span>
          <span class="rec-usage-desc">LOL/原神/CS2</span>
        </label>
        <label class="rec-usage-card">
          <input type="checkbox" id="useAAAGame">
          <span class="rec-usage-icon">🔥</span>
          <span class="rec-usage-name">3A大作</span>
          <span class="rec-usage-desc">黑神话/赛博朋克/GTA6</span>
        </label>
        <label class="rec-usage-card">
          <input type="checkbox" id="useVideo">
          <span class="rec-usage-icon">🎬</span>
          <span class="rec-usage-name">视频剪辑</span>
          <span class="rec-usage-desc">PR/达芬奇/剪映</span>
        </label>
        <label class="rec-usage-card">
          <input type="checkbox" id="useAI">
          <span class="rec-usage-icon">🤖</span>
          <span class="rec-usage-name">AI/3D创作</span>
          <span class="rec-usage-desc">SD绘图/Blender/编程</span>
        </label>
      </div>
    </div>

    <!-- 平台偏好 -->
    <div class="rec-section">
      <div class="rec-section-title">⚙️ CPU平台偏好</div>
      <div class="rec-platform-group">
        <label class="rec-platform-option">
          <input type="radio" name="platform" value="any" checked>
          <span>无所谓</span>
        </label>
        <label class="rec-platform-option">
          <input type="radio" name="platform" value="intel">
          <span>偏 Intel</span>
        </label>
        <label class="rec-platform-option">
          <input type="radio" name="platform" value="amd">
          <span>偏 AMD</span>
        </label>
      </div>
    </div>

    <button class="rec-btn-generate" id="btnGenerate">
      🎯 生成推荐配置
    </button>
  </div>

  <!-- 结果区 -->
  <div class="rec-result-card" id="resultArea">
    <div class="rec-result-placeholder">
      <div class="rec-placeholder-icon">🪄</div>
      <h3>选择预算和用途，点击生成</h3>
      <p>系统会自动匹配兼容、均衡、高性价比的整机配置</p>
    </div>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/recommend.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initRecommendPage();
  });
</script>
</body>
</html>
