<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 装机大师</title>
<link rel="stylesheet" href="styles.css">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 100px 24px 60px;
    position: relative; z-index: 1;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 36px 36px;
    box-shadow: 0 10px 40px rgba(0,0,0,.4);
  }
  .auth-logo {
    text-align: center; margin-bottom: 32px;
  }
  .auth-logo span {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 24px; font-weight: 700; letter-spacing: 1.5px;
    color: #fff;
  }
  .auth-logo .dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #7c3aed;
    margin-right: 8px;
    box-shadow: 0 0 12px rgba(124,58,237,0.5);
  }
  .auth-tabs {
    display: flex; gap: 0;
    margin-bottom: 28px;
    border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .auth-tab {
    flex: 1; padding: 12px;
    text-align: center; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.3s;
    background: transparent; border: none;
    color: rgba(255,255,255,0.4); font-family: inherit;
  }
  .auth-tab.active {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
  }
  .auth-tab:hover:not(.active) { color: rgba(255,255,255,0.7); }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .auth-field {
    margin-bottom: 20px;
  }
  .auth-field label {
    display: block; font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.5); margin-bottom: 6px;
  }
  .auth-field input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; color: #fff; font-size: 15px;
    font-family: inherit; outline: none;
    transition: border-color 0.3s;
  }
  .auth-field input:focus {
    border-color: rgba(124,58,237,0.4);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.06);
  }
  .auth-btn {
    width: 100%; padding: 14px;
    background: #7c3aed; color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    margin-top: 8px;
  }
  .auth-btn:hover { background: #6d28d9; box-shadow: 0 0 24px rgba(124,58,237,0.3); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-msg {
    text-align: center; font-size: 13px; margin-top: 16px;
    min-height: 20px;
  }
  .auth-msg.error { color: #ef4444; }
  .auth-msg.success { color: #22c55e; }
  .auth-footer {
    text-align: center; margin-top: 24px;
    font-size: 13px; color: rgba(255,255,255,0.3);
  }
  .auth-footer a {
    color: #a78bfa; text-decoration: none; cursor: pointer;
  }
  .auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<nav class="nav">
  <a href="index.html" class="nav-logo" style="text-decoration:none;">
    <span class="logo-icon">&#9670;</span>
    <span class="logo-text">PC BUILDER</span>
    <span class="logo-dot">AI</span>
  </a>
  <div class="nav-links">
    <a href="index.html">互动装机</a>
    <a href="recommend.html">一键推荐</a>
    <a href="service.html">上门组装 / 快递</a>
  </div>
  <div></div>

  <a href="login.html?redirect=index.html" class="nav-user-btn" id="navLoginBtn">登录</a>
  <div class="nav-user-menu" id="navUserMenu" style="display:none;">
    <span class="nav-user-email" id="navUserEmail"></span>
    <button class="nav-logout-btn" id="navLogoutBtn">退出</button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span><span class="dot"></span>PC BUILDER</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">注册</button>
    </div>

    <div class="auth-subtabs" id="subLogin" style="display:flex;gap:0;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);">
      <button class="auth-subtab active" data-sub="login-email" onclick="switchSubTab('login-email')" style="flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.4);font-family:inherit;transition:all 0.3s;">邮箱</button>
      <button class="auth-subtab" data-sub="login-phone" onclick="switchSubTab('login-phone')" style="flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.4);font-family:inherit;transition:all 0.3s;">手机号</button>
    </div>
    <div class="auth-subtabs" id="subRegister" style="display:none;gap:0;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);">
      <button class="auth-subtab active" data-sub="reg-email" onclick="switchSubTab('reg-email')" style="flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.4);font-family:inherit;transition:all 0.3s;">邮箱</button>
      <button class="auth-subtab" data-sub="reg-phone" onclick="switchSubTab('reg-phone')" style="flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.4);font-family:inherit;transition:all 0.3s;">手机号</button>
    </div>

    <!-- Login - Email -->
    <form class="auth-form active" id="formLoginEmail" onsubmit="handleLoginEmail(event)">
      <div class="auth-field">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="auth-field">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="输入密码" required minlength="6">
      </div>
      <div class="auth-msg" id="loginEmailMsg"></div>
      <button type="submit" class="auth-btn">登录</button>
    </form>

    <!-- Login - Phone -->
    <form class="auth-form" id="formLoginPhone" onsubmit="handleLoginPhone(event)">
      <div class="auth-field">
        <label>手机号</label>
        <input type="tel" id="loginPhone" placeholder="13800138000" required>
      </div>
      <div class="auth-field">
        <label>密码</label>
        <input type="password" id="loginPhonePwd" placeholder="输入密码" required minlength="6">
      </div>
      <div class="auth-msg" id="loginPhoneMsg"></div>
      <button type="submit" class="auth-btn">登录</button>
    </form>

    <!-- Register - Email -->
    <form class="auth-form" id="formRegEmail" onsubmit="handleRegEmail(event)">
      <div class="auth-field">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="auth-field">
        <label>密码</label>
        <input type="password" id="regPwd" placeholder="至少6位密码" required minlength="6">
      </div>
      <div class="auth-field">
        <label>确认密码</label>
        <input type="password" id="regPwd2" placeholder="再次输入密码" required minlength="6">
      </div>
      <div class="auth-msg" id="regEmailMsg"></div>
      <button type="submit" class="auth-btn">注册</button>
    </form>

    <!-- Register - Phone -->
    <form class="auth-form" id="formRegPhone" onsubmit="handleRegPhone(event)">
      <div class="auth-field">
        <label>手机号</label>
        <input type="tel" id="regPhone" placeholder="13800138000" required>
      </div>
      <div class="auth-field">
        <label>密码</label>
        <input type="password" id="regPhonePwd" placeholder="至少6位密码" required minlength="6">
      </div>
      <div class="auth-field">
        <label>确认密码</label>
        <input type="password" id="regPhonePwd2" placeholder="再次输入密码" required minlength="6">
      </div>
      <div class="auth-msg" id="regPhoneMsg"></div>
      <button type="submit" class="auth-btn">注册</button>
    </form>

    <div class="auth-footer" id="authFooter">
      <span id="footerText">注册即表示同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></span>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "./js/lib/three.module.js" } }
</script>
<script type="module">
import { supabase } from './js/supabase-client.js';

let currentSub = 'login-email';

const PHONE_DOMAIN = '@phone.pcbuilder.local';

function phoneToEmail(phone) {
  // Strip non-digits, create internal email for Supabase auth
  const digits = phone.replace(/\D/g, '');
  if (!/^1\d{10}$/.test(digits)) return null;
  return `p${digits}${PHONE_DOMAIN}`;
}

function setMsg(id, text, cls) {
  const el = document.getElementById(id);
  if (el) { el.textContent = text; el.className = 'auth-msg ' + (cls || ''); }
}

function redirectAfterLogin() {
  const r = new URLSearchParams(location.search).get('redirect');
  setTimeout(() => { location.href = r || 'index.html'; }, 600);
}

// ====== Tabs ======

window.switchAuthTab = function(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('subLogin').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('subRegister').style.display = tab === 'register' ? 'flex' : 'none';
  // Show correct form
  const allForms = ['formLoginEmail','formLoginPhone','formRegEmail','formRegPhone'];
  allForms.forEach(id => document.getElementById(id).classList.remove('active'));
  if (tab === 'login') {
    document.getElementById(currentSub.startsWith('login-') ? 'formLoginEmail' : 'formLoginPhone').classList.add('active');
  } else {
    document.getElementById(currentSub.startsWith('reg-') ? 'formRegEmail' : 'formRegPhone').classList.add('active');
  }
  // Clear messages
  ['loginEmailMsg','loginPhoneMsg','regEmailMsg','regPhoneMsg'].forEach(id => setMsg(id, ''));
};

window.switchSubTab = function(sub) {
  currentSub = sub;
  // Update sub-tab active states
  document.querySelectorAll('#subLogin .auth-subtab').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === sub);
    b.style.background = b.dataset.sub === sub ? 'rgba(124,58,237,0.15)' : 'transparent';
    b.style.color = b.dataset.sub === sub ? '#a78bfa' : 'rgba(255,255,255,0.4)';
  });
  document.querySelectorAll('#subRegister .auth-subtab').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === sub);
    b.style.background = b.dataset.sub === sub ? 'rgba(124,58,237,0.15)' : 'transparent';
    b.style.color = b.dataset.sub === sub ? '#a78bfa' : 'rgba(255,255,255,0.4)';
  });
  // Show corresponding form
  const formMap = {
    'login-email': 'formLoginEmail',
    'login-phone': 'formLoginPhone',
    'reg-email': 'formRegEmail',
    'reg-phone': 'formRegPhone',
  };
  ['formLoginEmail','formLoginPhone','formRegEmail','formRegPhone'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === formMap[sub]);
  });
  ['loginEmailMsg','loginPhoneMsg','regEmailMsg','regPhoneMsg'].forEach(id => setMsg(id, ''));
};

// ====== Email Login ======

window.handleLoginEmail = async function(e) {
  e.preventDefault();
  setMsg('loginEmailMsg', '');
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('loginEmail').value,
    password: document.getElementById('loginPwd').value,
  });
  if (error) {
    setMsg('loginEmailMsg', error.message === 'Invalid login credentials' ? '邮箱或密码错误' : error.message, 'error');
  } else {
    setMsg('loginEmailMsg', '登录成功，正在跳转...', 'success');
    redirectAfterLogin();
  }
};

// ====== Phone Login ======

window.handleLoginPhone = async function(e) {
  e.preventDefault();
  setMsg('loginPhoneMsg', '');
  const phone = document.getElementById('loginPhone').value.trim();
  const email = phoneToEmail(phone);
  if (!email) {
    setMsg('loginPhoneMsg', '请输入正确的11位手机号', 'error');
    return;
  }
  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: document.getElementById('loginPhonePwd').value,
  });
  if (error) {
    setMsg('loginPhoneMsg', error.message === 'Invalid login credentials' ? '手机号或密码错误' : error.message, 'error');
  } else {
    setMsg('loginPhoneMsg', '登录成功，正在跳转...', 'success');
    redirectAfterLogin();
  }
};

// ====== Email Register ======

window.handleRegEmail = async function(e) {
  e.preventDefault();
  const pwd1 = document.getElementById('regPwd').value;
  const pwd2 = document.getElementById('regPwd2').value;
  if (pwd1 !== pwd2) {
    setMsg('regEmailMsg', '两次密码不一致', 'error');
    return;
  }
  const { data, error } = await supabase.auth.signUp({
    email: document.getElementById('regEmail').value,
    password: pwd1,
  });
  if (error) {
    setMsg('regEmailMsg', error.message.includes('already registered') ? '该邮箱已注册' : error.message, 'error');
  } else if (data.user?.identities?.length === 0) {
    setMsg('regEmailMsg', '该邮箱已注册，请直接登录', 'error');
  } else {
    setMsg('regEmailMsg', '注册成功！正在跳转...', 'success');
    redirectAfterLogin();
  }
};

// ====== Phone Register ======

window.handleRegPhone = async function(e) {
  e.preventDefault();
  const phone = document.getElementById('regPhone').value.trim();
  const email = phoneToEmail(phone);
  if (!email) {
    setMsg('regPhoneMsg', '请输入正确的11位手机号', 'error');
    return;
  }
  const pwd1 = document.getElementById('regPhonePwd').value;
  const pwd2 = document.getElementById('regPhonePwd2').value;
  if (pwd1 !== pwd2) {
    setMsg('regPhoneMsg', '两次密码不一致', 'error');
    return;
  }
  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: pwd1,
    options: {
      data: { phone: phone, login_type: 'phone' }
    }
  });
  if (error) {
    setMsg('regPhoneMsg', error.message.includes('already registered') ? '该手机号已注册' : error.message, 'error');
  } else if (data.user?.identities?.length === 0) {
    setMsg('regPhoneMsg', '该手机号已注册，请直接登录', 'error');
  } else {
    // Save phone to profiles
    try {
      await supabase.from('profiles').upsert({
        id: data.user.id,
        username: phone,
        phone: phone,
        preferences: { theme: 'dark', currency: 'CNY', platform: 'auto' }
      });
    } catch (_) {}
    setMsg('regPhoneMsg', '注册成功！正在跳转...', 'success');
    redirectAfterLogin();
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>

<script type="module">
import { onAuthChange, signOut, getUserDisplay } from './js/auth.js';

onAuthChange((user) => {
  const loginBtn = document.getElementById('navLoginBtn');
  const userMenu = document.getElementById('navUserMenu');
  const userEmail = document.getElementById('navUserEmail');
  if (user) {
    if (loginBtn) loginBtn.style.display = 'none';
    if (userMenu) userMenu.style.display = 'flex';
    if (userEmail) userEmail.textContent = getUserDisplay();
  } else {
    if (loginBtn) loginBtn.style.display = '';
    if (userMenu) userMenu.style.display = 'none';
  }
});

document.getElementById('navLogoutBtn')?.addEventListener('click', async () => {
  await signOut();
  location.reload();
});
</script>
</body>
</html>
